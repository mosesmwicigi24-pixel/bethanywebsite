; Bethany House production PHP settings.

; Connect to the host MySQL over the mounted unix socket (database.php uses 'localhost').
mysqli.default_socket = /var/run/mysqld/mysqld.sock
pdo_mysql.default_socket = /var/run/mysqld/mysqld.sock

; Product-image uploads.
upload_max_filesize = 64M
post_max_size = 72M
memory_limit = 512M
max_execution_time = 120

date.timezone = Africa/Nairobi
expose_php = Off

opcache.enable = 1
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; Application code is baked into the immutable image, so there's nothing to
; revalidate at runtime — disabling the stat() check is a free latency win.
opcache.validate_timestamps = 0
; JIT (PHP 8.x): tracing mode with a 100M buffer for CPU-bound request paths.
opcache.jit = tracing
opcache.jit_buffer_size = 100M

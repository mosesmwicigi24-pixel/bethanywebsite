<VirtualHost *:80>
    DocumentRoot /var/www/html

    # CodeIgniter environment (index.php reads $_SERVER['CI_ENV']).
    SetEnv CI_ENV production

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # nginx terminates TLS and proxies over HTTP. Trust its forwarded headers so
    # CodeIgniter sees the real client IP and treats the request as HTTPS.
    RemoteIPHeader X-Forwarded-For
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

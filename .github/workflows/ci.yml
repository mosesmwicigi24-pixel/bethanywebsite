name: CI

# Lint + unit tests. Runs on PRs and on pushes to any branch. This is the quality
# gate BEFORE deploy.yml (which only runs on main). It never touches the VPS.
on:
  pull_request:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, gd, zip, bcmath
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Lint changed PHP (application/ + services/)
        run: |
          set -e
          find application services index.php -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l >/dev/null

      - name: Run unit tests
        run: vendor/bin/phpunit --colors=never
